[env]
_.file = "~/.env.default"

[settings]
idiomatic_version_file_enable_tools = ["ruby"]
ruby = { compile = true }
status = { missing_tools = "never" }

[tools]
ast-grep = "latest"
atuin = "latest"
biome = "latest"
bfs = "latest"
delta = "latest"
difftastic = "latest"
elasticsearch = "7"
elixir = "latest"
erlang = "latest"
eza = "latest"
fzf = "latest"
gh = "latest"
go = "latest"
java = "latest"
lazydocker = "latest"
lazygit = "latest"
lsd = "latest"
node = "lts"
pnpm = "latest"
python = "latest"
ruby = { version = "latest", depends = ["rust"] }
rust = { version = "latest", components = "rust-analyzer,rust-src" }
starship = { version = "latest", postinstall = "starship preset pure-preset -o ~/.config/starship.toml" }
usage = "latest"
yarn = "latest"
zoxide = "latest"

# Node.js
"npm:@earendil-works/pi-coding-agent" = { version = "latest", depends = ["node"] }
"npm:@herb-tools/language-server" = { version = "latest", depends = ["node"] }
"npm:agent-browser" = { version = "latest", depends = ["node"] }
"npm:@anthropic-ai/claude-code" = { version = "latest", os = ["linux"], depends = ["node"] }
"npm:@openai/codex" = { version = "latest", depends = ["node"] }
"npm:opencode-ai" = { version = "latest", depends = ["node"] }
